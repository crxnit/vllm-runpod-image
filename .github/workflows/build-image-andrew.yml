name: Build vLLM LoRA image

# Builds and pushes the base vllm-lora image (no model weights baked in).
# Trigger via CLI:  gh workflow run build-image.yml
# Custom tag:      gh workflow run build-image.yml -f tag=v1.0
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Custom image tag (instead of latest)"
        required: false
        default: "latest"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    steps:
      - name: Free up disk space
        run: |
          echo "=== Before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/lib/node_modules
          sudo docker image prune --all --force
          sudo docker builder prune --all --force
          echo "=== After cleanup ==="
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: image-tag
        run: |
          TAG="${{ github.event.inputs.tag || 'latest' }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.lora
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max

      - name: Verify CUDA is installed inside image
        if: github.event_name != 'pull_request'
        run: |
          docker run --rm \
            -e NVIDIA_VISIBLE_DEVICES=all \
            -e NVIDIA_DRIVER_CAPABILITIES=compute,utility \
            -e VLLM_TARGET_DEVICE=cuda \
            -e LD_LIBRARY_PATH=/usr/local/nvidia/lib64:/usr/local/cuda/lib64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }} \
            bash -c "
              set -e
              # Verify CUDA toolkit files are present (no GPU hardware required)
              test -d /usr/local/cuda || { echo 'ERROR: /usr/local/cuda not found'; exit 1; }
              CUDA_VERSION=\$(cat /usr/local/cuda/version.txt 2>/dev/null || cat /usr/local/cuda/version.json 2>/dev/null || nvcc --version 2>/dev/null | grep 'release' | awk '{print \$6}' | tr -d ,)
              echo \"CUDA installed: \${CUDA_VERSION}\"
              # Verify CUDA libraries are present
              ldconfig -p | grep -q libcuda || test -f /usr/local/cuda/lib64/libcudart.so* || ls /usr/local/cuda/lib64/libcudart* > /dev/null 2>&1
              echo 'CUDA installation verified'
            "

      - name: Verify Python packages are installed
        if: github.event_name != 'pull_request'
        run: |
          docker run --rm \
            -e VLLM_TARGET_DEVICE=cuda \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }} \
            python3 -c "
          import importlib.util
          packages = ['requests', 'pandas', 'transformers', 'peft', 'trl', 'datasets', 'accelerate', 'bitsandbytes']
          for pkg in packages:
              assert importlib.util.find_spec(pkg) is not None, f'{pkg} package not found'
              print(f'{pkg} package present')
          print('All required packages are present')
          "

      - name: Check start.sh is executable inside image
        if: github.event_name != 'pull_request'
        run: |
          docker run --rm \
            -e VLLM_TARGET_DEVICE=cuda \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }} \
            test -x /app/start.sh
          echo "start.sh is executable"

      - name: Check vLLM entrypoint exists
        if: github.event_name != 'pull_request'
        run: |
          docker run --rm \
            -e VLLM_TARGET_DEVICE=cuda \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }} \
            which vllm
          echo "vllm binary found"

      - name: Verify vLLM can be imported
        if: github.event_name != 'pull_request'
        run: |
          docker run --rm \
            -e VLLM_TARGET_DEVICE=cuda \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }} \
            python3 -c "import vllm; print('vllm version:', vllm.__version__)"
          echo "vllm import succeeded"
          # NOTE: 'vllm serve --help' cannot be used here because the GitHub
          # Actions runner has no GPU.  vLLM's argparse setup calls VllmConfig()
          # as a default factory during __init__, which triggers NVML platform
          # detection.  Without an NVIDIA driver, NVML reports "Shared Library
          # Not Found" and the CLI raises RuntimeError: Failed to infer device
          # type — even when VLLM_TARGET_DEVICE=cuda is set.  Importing the
          # package does not instantiate VllmConfig, so it works without GPU.

      - name: Print image details
        if: github.event_name != 'pull_request'
        run: |
          echo "Image pushed successfully!"
          echo ""
          echo "Tags:"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }}"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo ""
          echo "Use in RunPod template:"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }}"
          echo ""
          echo "Recommended RunPod environment variables:"
          echo "  MODEL_NAME       = Qwen/Qwen2.5-7B-Instruct"
          echo "  HF_TOKEN         = <your HuggingFace token, if model is gated>"
          echo "  API_KEY          = <secret key your classify scripts will use>"
          echo "  MAX_MODEL_LEN    = 4096"
          echo "  GPU_MEMORY_UTIL  = 0.90"
          echo "  ENABLE_LORA      = false"
          echo "  SKIP_PIP_INSTALL = true"
          echo ""
          echo "Recommended Helm values:"
          echo "  helm:"
          echo "    values:"
          echo "      runtimeClassName: nvidia"
          echo "    env:"
          echo "      - name: NVIDIA_VISIBLE_DEVICES"
          echo "        value: \"all\""
          echo "      - name: NVIDIA_DRIVER_CAPABILITIES"
          echo "        value: \"compute,utility\""
          echo "      - name: LD_LIBRARY_PATH"
          echo "        value: \"/usr/local/nvidia/lib64:/usr/local/cuda/lib64:\$(LD_LIBRARY_PATH)\""
