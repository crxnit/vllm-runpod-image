name: Build vLLM LoRA image

# Builds and pushes the base vllm-lora image (no model weights baked in).
# Trigger via CLI:  gh workflow run build-image.yml
# Custom tag:      gh workflow run build-image.yml -f tag=v1.0
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag"
        default: "latest"
      model:
        description: "HuggingFace model ID to bake in"
        default: "Qwen/Qwen2.5-7B-Instruct"
      quantization:
        description: "Quantization method (awq, gptq, or empty)"
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: read
      packages: write

    steps:
      - name: Free up disk space
        run: |
          echo "=== Before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/lib/node_modules
          sudo docker image prune --all --force
          sudo docker builder prune --all --force
          echo "=== After cleanup ==="
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: image-tag
        run: |
          TAG="${{ github.event.inputs.tag || 'latest' }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.lora
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |            
            MODEL=${{ github.event.inputs.model }}
            HF_TOKEN=${{ secrets.HF_TOKEN }}
            QUANTIZATION=${{ github.event.inputs.quantization }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max

      - name: Print image details
        if: github.event_name != 'pull_request'
        run: |
          echo "Image pushed successfully!"
          echo ""
          echo "Tags:"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }}"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo ""
          echo "Use in RunPod template:"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }}"
          echo ""
          echo "Recommended RunPod environment variables:"
          echo "  MODEL_NAME       = Qwen/Qwen2.5-7B-Instruct"
          echo "  HF_TOKEN         = <your HuggingFace token, if model is gated>"
          echo "  API_KEY          = <secret key your classify scripts will use>"
          echo "  MAX_MODEL_LEN    = 4096"
          echo "  GPU_MEMORY_UTIL  = 0.90"
          echo "  ENABLE_LORA      = false"
          echo "  SKIP_PIP_INSTALL = true"
          echo ""
          echo "Recommended Helm values:"
          echo "  helm:"
          echo "    values:"
          echo "      runtimeClassName: nvidia"
          echo "    env:"
          echo "      - name: NVIDIA_VISIBLE_DEVICES"
          echo "        value: \"all\""
          echo "      - name: NVIDIA_DRIVER_CAPABILITIES"
          echo "        value: \"compute,utility\""
          echo "      - name: LD_LIBRARY_PATH"
          echo "        value: \"/usr/local/nvidia/lib64:/usr/local/cuda/lib64:\$(LD_LIBRARY_PATH)\""
