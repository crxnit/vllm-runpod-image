name: Build vLLM image for RunPod (Docker Hub)

# Use this workflow instead of build-image.yml if you prefer Docker Hub over GHCR.
# Requires repository secrets: DOCKER_USERNAME and DOCKER_PASSWORD (access token).

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/vllm-coder:latest
            ${{ secrets.DOCKER_USERNAME }}/vllm-coder:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
