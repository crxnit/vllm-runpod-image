<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Advisor</title>
<link rel="stylesheet" href="shared/styles.css">
</head>
<body>

<div class="header">
  <div>
    <h1><span class="accent">College</span> Advisor</h1>
    <div class="subtitle">Your personal college admissions guide</div>
  </div>
  <span id="status" class="disconnected">Not connected</span>
</div>

<div class="chat" id="chat"></div>
<div class="starters" id="starters"></div>

<div class="input-area">
  <textarea id="prompt" rows="1"></textarea>
  <button id="clear">Clear</button>
  <button id="send">Send</button>
</div>

<div class="setup-overlay" id="setup-overlay">
  <div class="setup-box">
    <h2>Welcome!</h2>
    <p>Enter your connection details to get started. You only need to do this once.</p>
    <label>Endpoint URL</label>
    <input type="text" id="setup-endpoint" placeholder="https://your-pod-id-8000.proxy.runpod.net">
    <label>API Key</label>
    <input type="password" id="setup-key" placeholder="your-api-key">
    <button onclick="saveSetup()">Connect</button>
  </div>
</div>

<script>
window.CHAT_CONFIG = {
  id: 'college-advisor',
  mode: 'simple',
  maxTokens: 800,
  temperature: 0.6,
  stripThinking: true,
  placeholder: 'Ask me anything about college admissions...',
  welcomeMessage: `Hi! I'm your college admissions advisor. I'm here to help you navigate every step of the college process — from building your college list to crafting standout applications.\n\nWhat would you like to work on today?`,
  starters: [
    'Help me build my college list',
    'What should I look for in a college?',
    'How do I show demonstrated interest?',
    'Help me plan my application timeline',
    'Review my Common App essay idea',
    'What extracurriculars matter most?',
    'Explain Early Decision vs Early Action',
    'How do I ask for strong recommendation letters?',
  ],
  systemPrompt: `You are a warm, experienced college admissions counselor advising a 17-year-old high school junior. Be specific, actionable, and encouraging. Name specific schools when relevant. Always consider financial factors.

Ask clarifying questions before giving advice. Be honest about admissions competitiveness while staying encouraging. Help the student discover what matters to them, not just prestige.

You help with: college list building (reach/target/safety), application strategy (ED/EA/RD timing), essay brainstorming and feedback (never write essays for the student), demonstrated interest tactics, extracurricular positioning, recommendation letters, interview prep, financial aid (FAFSA/CSS Profile/merit aid/scholarships), and timeline planning.

Junior timeline: Spring — build list, visit campuses. Summer — draft personal statement, finalize list. Fall senior — submit Early apps (Nov 1-15). Winter — submit Regular apps (Jan 1-15), file FAFSA. Spring — compare offers, decide by May 1.

Rules: Never fabricate statistics or deadlines — say "verify on the school's website" if unsure. Never write essays for the student. Be sensitive to financial constraints.`,
};
</script>
<script src="shared/chat.js"></script>

</body>
</html>
