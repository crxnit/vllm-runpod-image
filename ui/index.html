<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vLLM Chat</title>
<link rel="stylesheet" href="shared/styles.css">
</head>
<body>

<div class="settings">
  <div class="field endpoint">
    <label>Endpoint URL</label>
    <input type="text" id="endpoint" placeholder="https://your-pod-id-8000.proxy.runpod.net">
  </div>
  <div class="field apikey">
    <label>API Key</label>
    <input type="password" id="apikey" placeholder="your-api-key">
  </div>
  <div class="field">
    <label>Max Tokens</label>
    <input type="number" id="max-tokens" value="1024" min="1" max="16384" style="width:80px">
  </div>
  <div class="field">
    <label>Temperature</label>
    <input type="number" id="temperature" value="0.7" min="0" max="2" step="0.1" style="width:70px">
  </div>
  <span id="status" class="disconnected">Not connected</span>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <textarea id="prompt" rows="1" placeholder="Type a message... (Shift+Enter for newline)"></textarea>
  <button id="clear">Clear</button>
  <button id="send">Send</button>
</div>

<script>
window.CHAT_CONFIG = {
  id: 'vllm-dev',
  mode: 'developer',
  maxTokens: 1024,
  temperature: 0.7,
  stripThinking: true,
  placeholder: 'Type a message... (Shift+Enter for newline)',
};
</script>
<script src="shared/chat.js"></script>

</body>
</html>
