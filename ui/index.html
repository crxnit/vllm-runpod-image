<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vLLM Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

  /* Settings bar */
  .settings { display: flex; gap: 8px; padding: 12px 16px; background: #16213e; border-bottom: 1px solid #0f3460; flex-wrap: wrap; align-items: center; }
  .settings label { font-size: 12px; color: #8899aa; }
  .settings input, .settings select { background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; padding: 6px 10px; border-radius: 6px; font-size: 13px; }
  .settings input:focus, .settings select:focus { outline: none; border-color: #e94560; }
  .settings .field { display: flex; flex-direction: column; gap: 2px; }
  .settings .field.endpoint { flex: 1; min-width: 250px; }
  .settings .field.apikey { min-width: 200px; }
  #status { font-size: 12px; padding: 4px 10px; border-radius: 12px; align-self: center; }
  #status.connected { background: #0a3d2a; color: #4ade80; }
  #status.disconnected { background: #3d0a0a; color: #f87171; }
  #status.checking { background: #3d3a0a; color: #fbbf24; }

  /* Chat area */
  .chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; word-wrap: break-word; }
  .message.user { align-self: flex-end; background: #0f3460; border-bottom-right-radius: 4px; }
  .message.assistant { align-self: flex-start; background: #16213e; border-bottom-left-radius: 4px; }
  .message.assistant code { background: #1a1a2e; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .message.assistant pre { background: #1a1a2e; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
  .message.assistant pre code { background: none; padding: 0; }
  .message.error { align-self: center; background: #3d0a0a; color: #f87171; font-size: 13px; }
  .message .meta { font-size: 11px; color: #667788; margin-top: 8px; }
  .typing { align-self: flex-start; color: #667788; font-size: 13px; padding: 8px 16px; }

  /* Input area */
  .input-area { padding: 12px 16px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 8px; }
  #prompt { flex: 1; background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; padding: 10px 14px; border-radius: 8px; font-size: 14px; font-family: inherit; resize: none; min-height: 44px; max-height: 200px; }
  #prompt:focus { outline: none; border-color: #e94560; }
  #send { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600; }
  #send:hover { background: #c73650; }
  #send:disabled { background: #444; cursor: not-allowed; }
  #clear { background: #0f3460; color: #e0e0e0; border: none; padding: 10px 14px; border-radius: 8px; font-size: 14px; cursor: pointer; }
  #clear:hover { background: #1a4a8a; }
</style>
</head>
<body>

<div class="settings">
  <div class="field endpoint">
    <label>Endpoint URL</label>
    <input type="text" id="endpoint" placeholder="https://your-pod-id-8000.proxy.runpod.net">
  </div>
  <div class="field apikey">
    <label>API Key</label>
    <input type="password" id="apikey" placeholder="your-api-key">
  </div>
  <div class="field">
    <label>Max Tokens</label>
    <input type="number" id="max-tokens" value="1024" min="1" max="16384" style="width:80px">
  </div>
  <div class="field">
    <label>Temperature</label>
    <input type="number" id="temperature" value="0.7" min="0" max="2" step="0.1" style="width:70px">
  </div>
  <span id="status" class="disconnected">Not connected</span>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <textarea id="prompt" rows="1" placeholder="Type a message... (Shift+Enter for newline)"></textarea>
  <button id="clear">Clear</button>
  <button id="send">Send</button>
</div>

<script>
const chatEl = document.getElementById('chat');
const promptEl = document.getElementById('prompt');
const sendBtn = document.getElementById('send');
const clearBtn = document.getElementById('clear');
const endpointEl = document.getElementById('endpoint');
const apikeyEl = document.getElementById('apikey');
const maxTokensEl = document.getElementById('max-tokens');
const temperatureEl = document.getElementById('temperature');
const statusEl = document.getElementById('status');

let messages = [];
let generating = false;

// Persist settings
function saveSettings() {
  localStorage.setItem('vllm-endpoint', endpointEl.value);
  localStorage.setItem('vllm-apikey', apikeyEl.value);
  localStorage.setItem('vllm-max-tokens', maxTokensEl.value);
  localStorage.setItem('vllm-temperature', temperatureEl.value);
}

function loadSettings() {
  endpointEl.value = localStorage.getItem('vllm-endpoint') || '';
  apikeyEl.value = localStorage.getItem('vllm-apikey') || '';
  maxTokensEl.value = localStorage.getItem('vllm-max-tokens') || '1024';
  temperatureEl.value = localStorage.getItem('vllm-temperature') || '0.7';
}

loadSettings();
[endpointEl, apikeyEl, maxTokensEl, temperatureEl].forEach(el =>
  el.addEventListener('change', saveSettings)
);

// Check connection
async function checkConnection() {
  const base = endpointEl.value.replace(/\/+$/, '');
  if (!base) { setStatus('disconnected', 'Not connected'); return; }
  setStatus('checking', 'Checking...');
  try {
    const res = await fetch(base + '/v1/models', {
      headers: { 'Authorization': 'Bearer ' + apikeyEl.value }
    });
    if (res.ok) {
      const data = await res.json();
      const model = data.data?.[0]?.id || 'unknown';
      setStatus('connected', model);
    } else {
      setStatus('disconnected', 'HTTP ' + res.status);
    }
  } catch (e) {
    setStatus('disconnected', 'Unreachable');
  }
}

function setStatus(cls, text) {
  statusEl.className = cls;
  statusEl.textContent = text;
}

endpointEl.addEventListener('change', checkConnection);
apikeyEl.addEventListener('change', checkConnection);
if (endpointEl.value) checkConnection();

// Chat
function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = 'message ' + role;
  div.textContent = content;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

async function send() {
  const text = promptEl.value.trim();
  if (!text || generating) return;

  const base = endpointEl.value.replace(/\/+$/, '');
  if (!base) { addMessage('error', 'Set the endpoint URL first.'); return; }

  messages.push({ role: 'user', content: text });
  addMessage('user', text);
  promptEl.value = '';
  promptEl.style.height = 'auto';

  generating = true;
  sendBtn.disabled = true;

  const assistantDiv = addMessage('assistant', '');
  let fullContent = '';
  const startTime = Date.now();

  try {
    const res = await fetch(base + '/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apikeyEl.value
      },
      body: JSON.stringify({
        model: '/models/weights',
        messages: messages,
        max_tokens: parseInt(maxTokensEl.value),
        temperature: parseFloat(temperatureEl.value),
        stream: true
      })
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error('HTTP ' + res.status + ': ' + err);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content;
          if (delta) {
            fullContent += delta;
            assistantDiv.textContent = fullContent;
            chatEl.scrollTop = chatEl.scrollHeight;
          }
        } catch (e) {}
      }
    }

    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    const tokenCount = fullContent.split(/\s+/).length;
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = `${elapsed}s`;
    assistantDiv.appendChild(meta);

    messages.push({ role: 'assistant', content: fullContent });

  } catch (e) {
    assistantDiv.className = 'message error';
    assistantDiv.textContent = e.message;
    messages.pop(); // remove the user message that failed
  }

  generating = false;
  sendBtn.disabled = false;
  promptEl.focus();
}

// Event listeners
sendBtn.addEventListener('click', send);
promptEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

// Auto-resize textarea
promptEl.addEventListener('input', () => {
  promptEl.style.height = 'auto';
  promptEl.style.height = Math.min(promptEl.scrollHeight, 200) + 'px';
});

clearBtn.addEventListener('click', () => {
  messages = [];
  chatEl.innerHTML = '';
});
</script>

</body>
</html>
